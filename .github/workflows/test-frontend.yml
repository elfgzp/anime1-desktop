name: Frontend Test

# 前端代码检查和测试
on:
  push:
    branches:
      - main
      - master
      - feature/*
    paths:
      - 'src/renderer/**'
      - 'package.json'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'src/renderer/**'
      - 'package.json'

env:
  NODE_VERSION: '20'

jobs:
  lint-and-type-check:
    name: Lint and Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Lint (if eslint is configured)
        run: npm run lint || echo "Lint not configured, skipping"
