name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（用于测试，例如 1.0.0-test）'
        required: false
        default: 'test'
        type: string
      create_release:
        description: '是否创建 Release'
        required: false
        default: false
        type: boolean
      platform:
        description: '只构建指定平台'
        required: false
        default: ''
        type: string
        enum: ['', 'windows', 'macos', 'linux']

env:
  NODE_VERSION: '20'

jobs:
  build-linux:
    name: Build on Linux-x64
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == '' || inputs.platform == 'linux' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and update package.json
        run: |
          # 从 git tag 获取版本号 (例如 v0.3.8 -> 0.3.8)
          VERSION="${GITHUB_REF#refs/tags/v}"
          # 如果是 workflow_dispatch 且指定了版本
          if [ "${{ github.event.inputs.version }}" != "" ] && [ "${{ github.event.inputs.version }}" != "test" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "Building version: $VERSION"
          # 更新 package.json
          npm version "$VERSION" --no-git-tag-version
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --force

      - name: Build application
        run: npm run build:fast -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-build
          path: release/
          retention-days: 7

  build-windows:
    name: Build on Windows-x64
    runs-on: windows-latest
    if: ${{ inputs.platform == '' || inputs.platform == 'windows' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and update package.json
        run: |
          $version = $env:GITHUB_REF -replace 'refs/tags/v', ''
          if ("${{ github.event.inputs.version }}" -ne "" -and "${{ github.event.inputs.version }}" -ne "test") {
            $version = "${{ github.event.inputs.version }}"
          }
          echo "Building version: $version"
          npm version $version --no-git-tag-version
        shell: pwsh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --force

      - name: Build application
        run: npm run build:win:fast -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-build
          path: release/
          retention-days: 7

  build-macos-arm64:
    name: Build on macOS-arm64
    runs-on: macos-latest
    if: ${{ inputs.platform == '' || inputs.platform == 'macos' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and update package.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "${{ github.event.inputs.version }}" != "" ] && [ "${{ github.event.inputs.version }}" != "test" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "Building version: $VERSION"
          npm version $VERSION --no-git-tag-version
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --force

      - name: Build application
        run: npm run build:mac:fast -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64-build
          path: release/
          retention-days: 7

  build-macos-x64:
    name: Build on macOS-x64
    runs-on: macos-15
    if: ${{ inputs.platform == '' || inputs.platform == 'macos' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version and update package.json
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [ "${{ github.event.inputs.version }}" != "" ] && [ "${{ github.event.inputs.version }}" != "test" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "Building version: $VERSION"
          npm version $VERSION --no-git-tag-version
        shell: bash

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install --force

      - name: Build application
        run: npm run build:mac:fast -- --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-build
          path: release/
          retention-days: 7

  release:
    name: Create Release
    needs: [build-linux, build-windows, build-macos-arm64, build-macos-x64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # 复制所有构建产物（包括自动更新所需的 yml 文件）
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.tar.gz" -o -name "latest-*.yml" -o -name "*.blockmap" \) -exec cp {} release-assets/ \;
          ls -la release-assets/

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: Release ${{ steps.version.outputs.tag_name }}
          body: |
            ## Anime1Desktop ${{ steps.version.outputs.tag_name }}

            ### 下载

            - **Windows (x64)**: `Anime1Desktop-*-win.zip` 或 `*-setup.exe`
            - **macOS (Intel)**: `Anime1Desktop-*-x64.dmg`
            - **macOS (Apple Silicon)**: `Anime1Desktop-*-arm64.dmg`
            - **Linux (x64)**: `Anime1Desktop-*-linux.tar.gz` 或 `*.AppImage`

            ### 安装说明

            - **macOS (推荐)**: 使用 Homebrew 安装
              ```bash
              brew tap elfgzp/tap
              brew install --cask anime1-desktop
              ```

            - **macOS (手动)**: 下载对应的 DMG 文件，双击挂载，将 Anime1Desktop.app 拖拽到应用程序文件夹

            - **Windows 便携版**: 解压 zip 文件，运行其中的 Anime1Desktop.exe

            - **Windows 安装包**: 双击运行 setup.exe，按照向导安装

            - **Linux**: 根据你的系统架构选择对应的版本，解压 tar.gz 文件后运行

          files: release-assets/*
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag_name, '-') || contains(steps.version.outputs.tag_name, 'alpha') || contains(steps.version.outputs.tag_name, 'beta') || contains(steps.version.outputs.tag_name, 'rc') }}
